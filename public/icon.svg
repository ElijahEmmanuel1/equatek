<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd190"/>
      <stop offset="100%" stop-color="#ff8c42"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#131c38"/>
      <stop offset="100%" stop-color="#080d1a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Subtle glow accent -->
  <ellipse cx="370" cy="140" rx="120" ry="80" fill="rgba(124,158,255,0.10)"/>
  <!-- "E" letter as path — bold, geometric -->
  <path
    d="M 120,100 H 400 V 172 H 202 V 232 H 372 V 304 H 202 V 362 H 400 V 434 H 120 Z"
    fill="url(#grad)"
  />
</svg>
